<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Background circle -->
  <circle cx="32" cy="32" r="32" fill="#FF7A00"/>

  <!-- Temple Gopuram silhouette (white) -->
  <!-- Base platform -->
  <rect x="10" y="52" width="44" height="5" rx="1.5" fill="white"/>
  <!-- Ground floor -->
  <rect x="14" y="44" width="36" height="10" rx="1" fill="white"/>
  <!-- First level -->
  <rect x="18" y="36" width="28" height="10" rx="1" fill="white"/>
  <!-- Second level -->
  <rect x="22" y="29" width="20" height="9" rx="1" fill="white"/>
  <!-- Third level -->
  <rect x="25" y="23" width="14" height="8" rx="1" fill="white"/>
  <!-- Fourth level -->
  <rect x="28" y="18" width="8" height="7" rx="1" fill="white"/>
  <!-- Fifth level (topmost rectangular) -->
  <rect x="29.5" y="13" width="5" height="7" rx="1" fill="white"/>
  <!-- Finial / Kalasha at top -->
  <ellipse cx="32" cy="11" rx="3" ry="3.5" fill="white"/>
  <circle cx="32" cy="7.5" rx="1.5" ry="1.5" fill="white"/>
  <!-- Decorative horizontal lines on base -->
  <rect x="14" y="46.5" width="36" height="1" rx="0.5" fill="#FF7A00" opacity="0.4"/>
  <rect x="18" y="38.5" width="28" height="1" rx="0.5" fill="#FF7A00" opacity="0.4"/>
  <rect x="22" y="31.5" width="20" height="1" rx="0.5" fill="#FF7A00" opacity="0.4"/>
</svg>
